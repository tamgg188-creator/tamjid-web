    <script>
        // আপনার ইমেজ স্ক্রিপ্ট একই থাকবে
        const base_url = 'https://docs.google.com/spreadsheets/d/1YdwUDSkKpzlg3Rjqp0fhAaSbVwC5NCySMrvdSR-RDd4/export?format=csv';
        const SHEETS_CSV_URL = base_url + '&cache=' + new Date().getTime();

        async function loadProfileImage() {
            try {
                const response = await fetch(SHEETS_CSV_URL);
                const data = await response.text();
                const rows = data.split('\n');
                rows.forEach(row => {
                    const columns = row.split(',');
                    if (columns.length >= 2) {
                        const key = columns[0].trim();
                        const value = columns[1].trim();
                        if (key === 'profile_image') {
                            document.getElementById('profile_img').src = value;
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading image:', error);
            }
        }
        loadProfileImage();
    </script>
