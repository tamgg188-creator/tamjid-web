<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamjid Islam | Cyborg Developer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            /* একটি ডিফিউজড ব্লু-সবুজ-ডার্ক ব্যাকগ্রাউন্ড যা আসল ছবির মতো */
            background: linear-gradient(135deg, #1e3a8a 0%, #064e3b 50%, #0f172a 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex items-center justify-center p-6 md:p-12">

    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
        <div class="flex justify-center md:justify-start">
            <img src="cyborg-man.png" alt="Cyborg Tamjid" class="w-full max-w-sm h-auto drop-shadow-lg">
        </div>

        <div class="flex flex-col gap-8">
            <div class="glass-panel p-10 rounded-2xl flex flex-col gap-6">
                
                <div class="flex flex-col gap-3">
                    <p class="text-3xl font-bold">আমি,</p>
                    <h1 class="text-5xl md:text-6xl font-black">তামজিদুল ইসলাম (অভি)</h1>
                </div>

                <div class="w-20 h-0.5 bg-gray-500 rounded-full"></div>

                <div class="flex items-start gap-5 p-5 bg-gray-900/40 rounded-xl relative">
                    <p class="text-xl leading-relaxed text-gray-300">
                        আমি একজন ডিজিটাল ক্রিয়েটর। ওয়েবসাইট ডেভেলপমেন্ট, গ্রাফিক্স ডিজাইন, ও ব্যবসা প্রতিষ্ঠান নিয়ে আমার আগ্রহ রয়েছে।
                    </p>
                    <div class="absolute right-5 bottom-5 flex items-center gap-3">
                        <i class="fas fa-code text-gray-600"></i>
                        <i class="fas fa-paint-brush text-gray-600"></i>
                    </div>
                </div>

                <div class="flex items-center gap-4 p-5 bg-gray-900/40 rounded-xl">
                    <p class="text-xl leading-relaxed text-gray-300">
                        আমি মূলত একজন বিশ্ববিদ্যালয় শিক্ষার্থী।
                    </p>
                    <i class="fas fa-briefcase text-gray-600"></i>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
