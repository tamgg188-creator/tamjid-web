<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>হোম | MD Tamjidul Islam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: radial-gradient(circle at 30% 30%, #1e293b 0%, #0f172a 100%); color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-left: 4px solid #3b82f6; }
        .glow-effect { filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.4)); }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 bg-slate-950/50 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-500">TAMJID <span class="text-white">2.0</span></h1>
            <div class="space-x-8 text-sm font-medium">
                <a href="index.html" class="text-blue-400">হোম</a>
                <a href="contact.html" class="hover:text-blue-400 transition">যোগাযোগ</a>
                <a href="privacy.html" class="hover:text-red-400 transition">প্রাইভেসি পলিসি</a>
            </div>
        </div>
    </nav>

    <section class="min-h-screen flex items-center pt-20 px-6">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
            <div class="flex justify-center relative">
                <div class="absolute inset-0 bg-blue-500/20 blur-[100px] rounded-full"></div>
                <img id="profile_img" src="https://via.placeholder.com/500x600?text=Loading..." class="w-full max-w-md h-auto glow-effect rounded-2xl relative z-10 transition-opacity duration-700 opacity-0" onload="this.style.opacity='1'">
            </div>
            <div class="space-y-6">
                <div class="glass-card p-8 md:p-12 rounded-2xl">
                    <p class="text-2xl text-blue-400 mb-2 font-light">আমি,</p>
                    <h1 class="text-4xl md:text-6xl font-bold mb-6">তামজিদুল ইসলাম (অভি)</h1>
                    <p class="text-lg text-slate-300 leading-relaxed">আমি একজন ডিজিটাল ক্রিয়েটর। ওয়েবসাইট ডেভেলপমেন্ট, গ্রাফিক্স ডিজাইন, ও ব্যবসা প্রতিষ্ঠান নিয়ে আমার আগ্রহ রয়েছে।</p>
                    <p class="mt-4 text-sm text-slate-400 italic">Developer of Ira AI Assistant</p>
                </div>
            </div>
        </div>
    </section>
    
    <script>
        const base_url = 'https://docs.google.com/spreadsheets/d/1YdwUDSkKpzlg3Rjqp0fhAaSbVwC5NCySMrvdSR-RDd4/export?format=csv';
        fetch(base_url).then(res => res.text()).then(data => {
            const row = data.split('\n').find(r => r.includes('profile_image'));
            if(row) document.getElementById('profile_img').src = row.split(',')[1].trim();
        });
    </script>
</body>
</html>
