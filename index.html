<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Tamjidul Islam - Portfolio</title>
    
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js" type="module"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: radial-gradient(circle at 30% 30%, #1e293b 0%, #0f172a 100%);
            margin: 0;
            overflow: hidden; /* Prevent scrolling during load */
        }

        /* The main preloader overlay */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95); /* Deep dark background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        /* Container for the bee and custom animation */
        .bee-loading-container {
            position: relative;
            width: 150px; /* Overall container size */
            height: 150px;
        }

        /* The original small bee Lottie */
        dotlottie-wc.isolated-bee {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px !important; /* The tiny bee itself */
            height: 50px !important;
        }

        /* NEW beautiful rotating ring */
        .loading-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-top: 2px solid #3b82f6; /* Blue pulse */
            border-radius: 50%;
            animation: rotate-ring 1.5s linear infinite;
        }

        /* The small particle effect (custom design) */
        .loading-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#3b82f6 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.3;
            animation: pulse-particles 2s ease-in-out infinite;
        }

        @keyframes rotate-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse-particles {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
        }

        #loading-text {
            color: white;
            font-family: 'Hind Siliguri', sans-serif;
            margin-top: 20px;
            font-size: 1.2rem;
            text-align: center;
        }

    </style>
</head>
<body>

    <div id="preloader">
        <div class="bee-loading-container">
            <div class="loading-ring"></div>
            <div class="loading-particles"></div>
            
            <dotlottie-wc class="isolated-bee" src="https://lottie.host/bcfd6a15-dd4b-4b37-a92b-360a908f3998/z5MUEa19ad.lottie" autoplay loop></dotlottie-wc>
        </div>
        <div id="loading-text">লোডিং হচ্ছে...<br><span style="font-size:0.8rem">TAMJID 2.0</span></div>
    </div>

    <nav class="fixed w-full z-50 bg-slate-950/50 backdrop-blur-md border-b border-white/5">
        </nav>
    <section id="about" class="min-h-screen flex items-center pt-20 px-6">
        </section>
    <script>
        // Start a timer when the page loads
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            
            // Wait 3 seconds (3000ms), then hide the preloader
            setTimeout(function() {
                preloader.style.opacity = '0';
                
                // Completely remove the preloader after the animation
                setTimeout(function() {
                    preloader.style.display = 'none';
                    document.body.style.overflow = 'auto'; // Re-enable scrolling
                }, 500); // Wait for the opacity fade
            }, 3000); 
        });
    </script>
</body>
</html>
